<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
    <style>
        body {
            background: linear-gradient(to right, #FF512F, #DD2476);
            text-align: center;
            background-color: #FF512F;
            padding: 50px;
        }
        .success-container {
            background:#dfd7d5;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }
        h2 {
            color: #28a745;
        }
        p {
            font-size: 18px;
            color: #333;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #5553d8;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h2>✅ Success!</h2>
        <p>{{ message }}</p>
        <a href="{{ url_for('home') }}" class="btn">Go to Home</a>
    </div>
</body>
</html>
